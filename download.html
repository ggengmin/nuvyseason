<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvy Photo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0e8;
    --cream: #fdfbf7;
    --ink: #1a1a18;
    --ink-soft: #3d3d38;
    --ink-muted: #7a7a72;
    --green: #3a5c2e;
    --border: #c4bfb0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Courier Prime', monospace;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── 로딩 화면 ── */
  .loading-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    gap: 16px;
    transition: opacity 0.6s ease;
  }
  .loading-wrap.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.25em;
    animation: blink 1.4s ease-in-out infinite;
  }

  /* 영수증 프린터 아이콘 */
  .printer-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .printer-body {
    width: 48px;
    height: 32px;
    background: var(--ink-soft);
    border-radius: 4px;
    position: relative;
  }
  .printer-paper {
    width: 32px;
    height: 0;
    background: white;
    border: 1px solid var(--border);
    margin: 0 auto;
    animation: paper-out 1.8s ease-in-out infinite;
    transform-origin: top center;
    border-radius: 0 0 2px 2px;
  }

  @keyframes paper-out {
    0%   { height: 0; }
    60%  { height: 36px; }
    80%  { height: 36px; }
    100% { height: 0; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── 영수증 슬롯 (클립 역할) ── */
  .receipt-slot {
    width: 100%;
    max-width: 380px;
    overflow: hidden; /* 핵심! 여기서 잘려서 올라오는 효과 */
    position: relative;
    /* 처음엔 높이 0 → 점점 늘어남 */
    height: 0;
    transition: height 2.4s cubic-bezier(0.4, 0, 0.2, 1);
    flex-shrink: 0;
  }

  .receipt-slot.rolling {
    height: var(--target-height, 2000px);
  }

  /* ── 영수증 이미지 ── */
  #receipt-img {
    width: 100%;
    display: block;
  }

  /* ── 버튼 영역 ── */
  .actions {
    width: 100%;
    max-width: 380px;
    padding: 20px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    flex-shrink: 0;
  }

  .actions.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .btn-download {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--green);
    background: transparent;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--green);
    transition: all 0.15s;
  }
  .btn-download:hover { background: var(--green); color: var(--cream); }
  .btn-download:active { background: #2a4a20; color: var(--cream); }
  .btn-download:disabled { opacity: 0.4; cursor: default; }

  .insta-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--ink-muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: color 0.15s;
  }
  .insta-link:hover { color: var(--green); border-color: var(--green); }

  .insta-icon {
    width: 13px;
    height: 13px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<!-- 로딩 -->
<div class="loading-wrap" id="loading-wrap">
  <div class="printer-icon">
    <div class="printer-body"></div>
    <div class="printer-paper"></div>
  </div>
  <p class="loading-text" id="loading-text">영수증을 뽑는 중입니다...</p>
</div>

<!-- 영수증 슬롯 (밑에서 위로 주욱 올라옴) -->
<div class="receipt-slot" id="receipt-slot">
  <img id="receipt-img" src="" alt="영수증">
</div>

<!-- 버튼 + 인스타 -->
<div class="actions" id="actions">
  <button class="btn-download" id="download-btn" onclick="downloadImage()" disabled>
    ↓ SAVE RECEIPT
  </button>
  <a class="insta-link" href="https://www.instagram.com/nuvy.photo/" target="_blank">
    <svg class="insta-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
    </svg>
    @nuvy.photo
  </a>
</div>

<script>
  let imageURL = null;

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  async function loadImage() {
    const imgParam = getParam('img');
    if (!imgParam) {
      document.getElementById('loading-text').textContent = '이미지 정보가 없습니다.';
      return;
    }

    imageURL = decodeURIComponent(imgParam);
    const img = document.getElementById('receipt-img');
    const slot = document.getElementById('receipt-slot');

    img.onload = () => {
      const imgHeight = img.naturalHeight * (380 / img.naturalWidth);

      // 로딩 숨기기
      setTimeout(() => {
        document.getElementById('loading-wrap').classList.add('hidden');
      }, 600);

      // 영수증 슬롯 높이를 실제 이미지 높이로 설정 → 주욱 올라옴
      setTimeout(() => {
        slot.style.setProperty('--target-height', imgHeight + 'px');
        slot.style.height = '0';
        void slot.offsetWidth; // reflow
        slot.style.transition = 'height 2.4s cubic-bezier(0.4, 0, 0.2, 1)';
        slot.style.height = imgHeight + 'px';
      }, 800);

      // 다 올라오면 버튼 등장
      setTimeout(() => {
        document.getElementById('actions').classList.add('visible');
        document.getElementById('download-btn').disabled = false;
      }, 3400);
    };

    img.onerror = () => {
      document.getElementById('loading-text').textContent = '이미지를 불러올 수 없습니다.';
    };

    img.src = imageURL;
  }

  async function downloadImage() {
    if (!imageURL) return;
    try {
      const response = await fetch(imageURL);
      const blob = await response.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = `nuvy-photo-${Date.now()}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    } catch (e) {
      console.error(e);
      window.open(imageURL, '_blank');
    }
  }

  window.addEventListener('load', loadImage);
</script>
</body>
</html>
