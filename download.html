<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvy Photo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0e8;
    --cream: #fdfbf7;
    --ink: #1a1a18;
    --ink-soft: #3d3d38;
    --ink-muted: #7a7a72;
    --green: #3a5c2e;
    --border: #c4bfb0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* 로고 */
  .logo {
    text-align: center;
  }
  .logo-tag {
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--green);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .logo-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.06em;
  }

  /* 구분선 */
  .divider {
    width: 100%;
    border: none;
    border-top: 1px dashed var(--border);
  }

  /* 사진 */
  .photo-wrap {
    width: 100%;
    position: relative;
    background: #eee;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #receipt-img {
    width: 100%;
    display: block;
  }

  .loading-text {
    color: var(--ink-muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 40px;
  }

  /* 다운로드 버튼 */
  .btn-download {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--green);
    background: transparent;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--green);
    transition: all 0.15s;
  }
  .btn-download:hover { background: var(--green); color: var(--cream); }
  .btn-download:active { background: #2a4a20; color: var(--cream); }
  .btn-download:disabled { opacity: 0.4; cursor: default; }

  /* 인스타 */
  .insta-wrap { text-align: center; }
  .insta-label {
    font-size: 8px;
    color: var(--ink-muted);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }
  .insta-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: color 0.15s;
  }
  .insta-link:hover { color: var(--green); border-color: var(--green); }

  .insta-icon {
    width: 14px;
    height: 14px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo">
    <p class="logo-tag">✿ NUVY PHOTO ✿</p>
    <p class="logo-title">오늘의 봄을 저장하세요</p>
  </div>

  <hr class="divider">

  <div class="photo-wrap">
    <p class="loading-text" id="loading">불러오는 중...</p>
    <img id="receipt-img" src="" alt="영수증" style="display:none;">
  </div>

  <hr class="divider">

  <button class="btn-download" id="download-btn" onclick="downloadImage()" disabled>
    ↓ SAVE RECEIPT
  </button>

  <div class="insta-wrap">
    <p class="insta-label">FIND US ON INSTAGRAM</p>
    <a class="insta-link" href="https://www.instagram.com/nuvy.photo/" target="_blank">
      <svg class="insta-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
      @nuvy.photo
    </a>
  </div>

</div>

<script>
  let imageURL = null;

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  async function loadImage() {
    const imgParam = getParam('img');
    if (!imgParam) {
      document.getElementById('loading').textContent = '이미지 정보가 없습니다.';
      return;
    }

    imageURL = decodeURIComponent(imgParam);
    const img = document.getElementById('receipt-img');

    img.onload = () => {
      document.getElementById('loading').style.display = 'none';
      img.style.display = 'block';
      document.getElementById('download-btn').disabled = false;
    };
    img.onerror = () => {
      document.getElementById('loading').textContent = '이미지를 불러올 수 없습니다.';
    };
    img.src = imageURL;
  }

  async function downloadImage() {
    if (!imageURL) return;
    try {
      const res = await fetch(imageURL);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `nuvy-photo-${Date.now()}.jpg`;
      link.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      window.open(imageURL, '_blank');
    }
  }

  window.addEventListener('load', () => loadImage());
</script>
</body>
</html>
