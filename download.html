<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuvy Photo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0e8;
    --cream: #fdfbf7;
    --ink: #1a1a18;
    --ink-soft: #3d3d38;
    --ink-muted: #7a7a72;
    --green: #3a5c2e;
    --border: #c4bfb0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    font-family: 'Courier Prime', monospace;
    overflow: hidden;
  }

  /* 영수증 — 처음엔 화면 아래 숨겨져 있음 */
  .receipt-wrap {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(100%);
    opacity: 0;
    transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.4s ease;
    padding-bottom: 0;
  }

  .receipt-wrap.visible {
    transform: translateY(0);
    opacity: 1;
  }

  /* 사진 */
  #receipt-img {
    width: 100%;
    display: block;
  }

  /* 버튼 + 인스타 — 처음엔 숨김 */
  .actions {
    width: 100%;
    max-width: 380px;
    padding: 16px 20px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .actions.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .btn-download {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--green);
    background: transparent;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--green);
    transition: all 0.15s;
  }
  .btn-download:hover { background: var(--green); color: var(--cream); }
  .btn-download:active { background: #2a4a20; color: var(--cream); }
  .btn-download:disabled { opacity: 0.4; cursor: default; }

  .insta-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--ink-muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: color 0.15s;
  }
  .insta-link:hover { color: var(--green); border-color: var(--green); }

  .insta-icon {
    width: 13px;
    height: 13px;
    opacity: 0.6;
  }

  /* 로딩 */
  .loading-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 10;
    transition: opacity 0.4s ease;
  }
  .loading-wrap.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loading-text {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>

<!-- 로딩 -->
<div class="loading-wrap" id="loading-wrap">
  <p class="loading-text">불러오는 중...</p>
</div>

<!-- 영수증 이미지 (밑에서 올라옴) -->
<div class="receipt-wrap" id="receipt-wrap">
  <img id="receipt-img" src="" alt="영수증">
</div>

<!-- 버튼 + 인스타 -->
<div class="actions" id="actions">
  <button class="btn-download" id="download-btn" onclick="downloadImage()" disabled>
    ↓ SAVE RECEIPT
  </button>
  <a class="insta-link" href="https://www.instagram.com/nuvy.photo/" target="_blank">
    <svg class="insta-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="20" height="20" rx="5" stroke="currentColor" stroke-width="2"/>
      <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
      <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
    </svg>
    @nuvy.photo
  </a>
</div>

<script>
  let imageURL = null;

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  async function loadImage() {
    const imgParam = getParam('img');
    if (!imgParam) {
      document.getElementById('loading-wrap').querySelector('.loading-text').textContent = '이미지 정보가 없습니다.';
      return;
    }

    imageURL = decodeURIComponent(imgParam);
    const img = document.getElementById('receipt-img');

    img.onload = () => {
      // 로딩 숨기기
      document.getElementById('loading-wrap').classList.add('hidden');

      // 살짝 딜레이 후 영수증 올라오기
      setTimeout(() => {
        document.getElementById('receipt-wrap').classList.add('visible');
      }, 100);

      // 영수증 다 올라오면 버튼 등장
      setTimeout(() => {
        document.getElementById('actions').classList.add('visible');
        document.getElementById('download-btn').disabled = false;
      }, 1000);
    };

    img.onerror = () => {
      document.getElementById('loading-wrap').querySelector('.loading-text').textContent = '이미지를 불러올 수 없습니다.';
    };

    img.src = imageURL;
  }

  async function downloadImage() {
    if (!imageURL) return;
    // fetch 버리고 그냥 새 탭으로 열기
    window.open(imageURL, '_blank');
  }

  window.addEventListener('load', loadImage);
</script>
</body>
</html>
