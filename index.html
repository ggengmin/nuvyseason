<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="달래네컷">
<title>Nuvy Photo × 달래김밥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0e8;
    --cream: #fdfbf7;
    --ink: #1a1a18;
    --ink-soft: #3d3d38;
    --ink-muted: #7a7a72;
    --green: #3a5c2e;
    --border: #c4bfb0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    padding: calc(16px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
  }

  /* ────── VIEWFINDER ────── */
  #viewfinder-screen {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding-top: 12px;
  }

  .vf-label {
    color: var(--ink-muted);
    font-size: 9px;
    letter-spacing: 0.25em;
  }

  .vf-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    background: #111;
    border: 1.5px solid var(--green);
    overflow: hidden;
  }

  #live-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  .vf-corner {
    position: absolute;
    width: 18px;
    height: 18px;
    border-color: var(--green);
    border-style: solid;
    opacity: 0.9;
  }
  .vf-corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .vf-corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .vf-corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .vf-corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  #countdown-display {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    z-index: 3;
  }
  #countdown-display.show { display: flex; }

  #countdown-number {
    font-size: 90px;
    font-weight: 700;
    color: #fff;
    animation: pulse 1s ease-in-out;
  }

  @keyframes pulse {
    0%   { transform: scale(1.5); opacity: 0; }
    60%  { transform: scale(1.0); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.7; }
  }

  .shoot-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid var(--green);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .shoot-btn::after {
    content: '';
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--green);
    transition: all 0.15s;
  }
  .shoot-btn:active::after { width: 38px; height: 38px; background: #2a4a20; }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.04s;
  }
  .flash-overlay.flash { opacity: 1; }

  /* ────── RECEIPT SCREEN ────── */
  #receipt-screen {
    display: none;
    width: 100%;
    max-width: 340px;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  #receipt-screen.show { display: flex; }

  #receipt-wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .zz-svg {
    display: block;
    width: 100%;
    flex-shrink: 0;
  }

  #receipt-body {
    background: var(--cream);
    padding: 14px 22px 18px;
    position: relative;
    overflow: hidden;
  }

  .btn-save { border-color: var(--green); color: var(--green); }
  .btn-save:hover { background: var(--green); color: #fdfbf7; }

  .dalrae-wm {
    position: absolute;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .receipt-content { position: relative; z-index: 1; }

  .r-header {
    text-align: center;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--border);
    margin-bottom: 12px;
  }
  .r-tag {
    font-size: 7px;
    letter-spacing: 0.3em;
    color: var(--green);
    font-weight: 700;
    margin-bottom: 5px;
  }
  .r-logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .r-logo em { color: var(--green); font-style: normal; }
  .r-sub {
    font-size: 7px;
    color: var(--ink-muted);
    letter-spacing: 0.18em;
    margin-top: 2px;
  }

  .r-meta {
    font-size: 9px;
    line-height: 1.9;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 12px;
    margin-bottom: 12px;
  }
  .r-meta-row { display: flex; justify-content: space-between; }
  .r-meta-label { color: var(--ink-muted); }
  .r-meta-val { color: var(--ink-soft); font-weight: 700; }

  /* photo — 3:4 fixed */
  .r-photo-wrap {
    width: 100%;
    aspect-ratio: 3/4;
    background: #111;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
    position: relative;
  }
  #captured-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .r-items {
    border-top: 1px dashed var(--border);
    border-bottom: 1px dashed var(--border);
    padding: 10px 0;
    margin-bottom: 12px;
  }
  .r-item {
    display: flex;
    align-items: baseline;
    font-size: 10px;
    margin-bottom: 4px;
    gap: 4px;
  }
  .r-item:last-child { margin-bottom: 0; }
  .r-item-name { color: var(--ink); flex-shrink: 0; }
  .r-item-dots {
    flex: 1;
    border-bottom: 1px dotted var(--border);
    position: relative;
    top: -3px;
  }
  .r-item-price { color: var(--ink); font-weight: 700; flex-shrink: 0; }

  .r-total {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
    margin-top: 7px;
    padding-top: 7px;
    border-top: 1.5px solid var(--ink);
  }

  .r-notices {
    font-size: 8.5px;
    color: var(--ink-muted);
    line-height: 1.9;
  }
  .r-notices p::before { content: '＊ '; }

  /* ────── QR SCREEN ────── */
  #qr-screen {
    display: none;
    width: 100%;
    max-width: 340px;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding-top: 20px;
  }
  #qr-screen.show { display: flex; }

  .qr-title {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.2em;
    text-align: center;
  }

  #qr-container {
    display: inline-block;
    padding: 12px;
    background: white;
    border: 1px solid var(--border);
  }
  #qr-container canvas,
  #qr-container img { display: block; }

  .qr-hint {
    font-size: 9px;
    color: var(--ink-muted);
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.8;
  }

  .qr-status {
    font-size: 10px;
    color: var(--ink-muted);
    text-align: center;
    letter-spacing: 0.1em;
  }

  /* action buttons */
  .action-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border: 1.5px solid;
    background: transparent;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    transition: all 0.15s;
  }
  .btn-retake { border-color: var(--green); color: var(--green); }
  .btn-retake:hover { background: var(--green); color: #fdfbf7; }

  #capture-canvas { display: none; }
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>

<!-- ── VIEWFINDER ── -->
<div id="viewfinder-screen">
  <p class="vf-label">≋ NUVY PHOTO × 달래김밥 ≋</p>
  <div class="vf-frame">
    <video id="live-video" autoplay playsinline muted></video>
    <div class="vf-corner tl"></div>
    <div class="vf-corner tr"></div>
    <div class="vf-corner bl"></div>
    <div class="vf-corner br"></div>
    <div id="countdown-display">
      <span id="countdown-number">3</span>
    </div>
  </div>
  <button class="shoot-btn" id="shoot-btn" onclick="startCountdown()"></button>
  <p class="vf-label" style="font-size:8px;">눌러서 촬영</p>
</div>

<!-- ── RECEIPT (캡처용 — 촬영 후 잠깐 보임) ── -->
<div id="receipt-screen">
  <div id="receipt-wrapper">

    <!-- zigzag TOP -->
    <svg class="zz-svg" viewBox="0 0 340 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="340" height="14" fill="transparent"/>
      <polygon fill="#fdfbf7" points="
        0,14 8.5,0 17,14 25.5,0 34,14 42.5,0 51,14 59.5,0 68,14 76.5,0
        85,14 93.5,0 102,14 110.5,0 119,14 127.5,0 136,14 144.5,0 153,14 161.5,0
        170,14 178.5,0 187,14 195.5,0 204,14 212.5,0 221,14 229.5,0 238,14 246.5,0
        255,14 263.5,0 272,14 280.5,0 289,14 297.5,0 306,14 314.5,0 323,14 331.5,0 340,14
      "/>
    </svg>

    <div id="receipt-body">

      <!-- 달래 이미지들 -->
      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="top:28px; left:8%; width:14%; transform:rotate(-15deg);">
      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="top:44px; right:14%; width:18%; transform:rotate(28deg);">
      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="bottom:60px; left:4%; width:16%; transform:rotate(10deg);">
      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="bottom:50px; right:5%; width:18%; transform:rotate(-12deg);">

      <div class="receipt-content">

        <div class="r-header">
          <p class="r-tag">✿ SEASONAL ITEM ✿</p>
          <p class="r-logo">Nuvy Photo <em>×</em> 달래김밥</p>
          <p class="r-sub">BUSAN CITIZEN PARK</p>
        </div>

        <div class="r-meta">
          <div class="r-meta-row">
            <span class="r-meta-label">ORDER NO.</span>
            <span class="r-meta-val" id="order-no">#0001</span>
          </div>
          <div class="r-meta-row">
            <span class="r-meta-label">DATE</span>
            <span class="r-meta-val" id="receipt-date">—</span>
          </div>
          <div class="r-meta-row">
            <span class="r-meta-label">WEATHER</span>
            <span class="r-meta-val">봄날의 햇살 ☀</span>
          </div>
        </div>

        <div class="r-photo-wrap">
          <img id="captured-photo" src="" alt="photo">
        </div>

        <div class="r-items">
          <div class="r-item">
            <span class="r-item-name">알싸한 봄 한 조각</span>
            <span class="r-item-dots"></span>
            <span class="r-item-price">1컷</span>
          </div>
          <div class="r-item">
            <span class="r-item-name">달래장 계란말이 추억</span>
            <span class="r-item-dots"></span>
            <span class="r-item-price">1인분</span>
          </div>
          <div class="r-item">
            <span class="r-item-name">부가세 (행복 포함)</span>
            <span class="r-item-dots"></span>
            <span class="r-item-price">100%</span>
          </div>
          <div class="r-total">
            <span>TOTAL</span>
            <span>₩ 0</span>
          </div>
        </div>

        <div class="r-notices">
          <p>본 상품은 유통기한이 없습니다.</p>
          <p>평생 간직을 권장합니다.</p>
          <p>재료: 달래의 향 + 계란의 고소함.</p>
        </div>

      </div>
    </div>

    <!-- zigzag BOTTOM -->
    <svg class="zz-svg" viewBox="0 0 340 14" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="340" height="14" fill="transparent"/>
      <polygon fill="#fdfbf7" points="
        0,0 8.5,14 17,0 25.5,14 34,0 42.5,14 51,0 59.5,14 68,0 76.5,14
        85,0 93.5,14 102,0 110.5,14 119,0 127.5,14 136,0 144.5,14 153,0 161.5,14
        170,0 178.5,14 187,0 195.5,14 204,0 212.5,14 221,0 229.5,14 238,0 246.5,14
        255,0 263.5,14 272,0 280.5,14 289,0 297.5,14 306,0 314.5,14 323,0 331.5,14 340,0
      "/>
    </svg>

  </div>
  <!-- 여기에 버튼 추가! -->
  <div class="action-row" style="margin-top:14px;">
    <button class="btn btn-retake" onclick="retake()">RETAKE</button>
    <button class="btn btn-save" onclick="captureAndUpload()">NEXT →</button>
  </div>
</div>



<!-- ── QR SCREEN ── -->
<div id="qr-screen">
  <p class="qr-title">≋ 봄을 주머니에 쏙 ≋</p>
  <p class="qr-status" id="qr-status">영수증 생성 중...</p>
  <div id="qr-container"></div>
  <p class="qr-hint">QR을 스캔하면<br>영수증이 저장돼요 🌿</p>
  <div class="action-row">
    <button class="btn btn-retake" onclick="retake()">RETAKE</button>
  </div>
</div>

<canvas id="capture-canvas"></canvas>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDCNniApykmIrkgpBI4rzhG5JEqvlsjCIc",
    authDomain:        "nuvyseason.firebaseapp.com",
    projectId:         "nuvyseason",
    storageBucket:     "nuvyseason.firebasestorage.app",
    messagingSenderId: "93515457991",
    appId:             "1:93515457991:web:6a4c78097a4d201199a5e2"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);
  window._fb = { storage, ref, uploadBytes, getDownloadURL };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
  const video     = document.getElementById('live-video');
  const capCanvas = document.getElementById('capture-canvas');
  const photo     = document.getElementById('captured-photo');
  const cdDisplay = document.getElementById('countdown-display');
  const cdNumber  = document.getElementById('countdown-number');
  const flashEl   = document.getElementById('flash');
  const shootBtn  = document.getElementById('shoot-btn');

  let stream       = null;
  let capturedBlob = null;
  let orderCount   = parseInt(localStorage.getItem('nuvy-order') || '0') + 1;

  // ── 카메라 ──
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1440 } },
        audio: false
      });
      video.srcObject = stream;
    } catch (e) {
      alert('카메라 권한을 허용해주세요 (HTTPS 필요)');
    }
  }

  // ── 카운트다운 ──
  function startCountdown() {
    if (!stream) return;
    shootBtn.disabled = true;
    let count = 3;
    cdDisplay.classList.add('show');
    cdNumber.textContent = count;
    const iv = setInterval(() => {
      count--;
      if (count > 0) {
        cdNumber.textContent = count;
        cdNumber.style.animation = 'none';
        void cdNumber.offsetWidth;
        cdNumber.style.animation = 'pulse 1s ease-in-out';
      } else {
        clearInterval(iv);
        cdDisplay.classList.remove('show');
        capturePhoto();
      }
    }, 1000);
  }

  // ── 촬영 (3:4 크롭 고정) ──
  function capturePhoto() {
    flashEl.classList.add('flash');
    setTimeout(() => flashEl.classList.remove('flash'), 150);

    const w = video.videoWidth;
    const h = video.videoHeight;

    // 3:4 비율로 크롭
    let sx = 0, sy = 0, sw = w, sh = h;
    const targetRatio = 3 / 4;
    const currentRatio = w / h;
    if (currentRatio > targetRatio) {
      sw = h * targetRatio;
      sx = (w - sw) / 2;
    } else {
      sh = w / targetRatio;
      sy = (h - sh) / 2;
    }

    const outW = 600, outH = 800;
    capCanvas.width = outW;
    capCanvas.height = outH;
    const ctx = capCanvas.getContext('2d');
    ctx.translate(outW, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outW, outH);

    capCanvas.toBlob(blob => {
      capturedBlob = blob;
      photo.src = URL.createObjectURL(blob);
      photo.onload = () => showReceipt();
    }, 'image/jpeg', 0.92);
  }

  // ── 영수증 화면 표시 ──
  function setMeta() {
    const now = new Date();
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    document.getElementById('receipt-date').textContent =
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
    document.getElementById('order-no').textContent = '#' + String(orderCount).padStart(4,'0');
  }

  async function showReceipt() {
    setMeta();
    localStorage.setItem('nuvy-order', orderCount);
    orderCount++;

    document.getElementById('viewfinder-screen').style.display = 'none';

    // 사진 로드 확실히 기다리기
    await new Promise(resolve => {
      if (photo.complete && photo.naturalWidth > 0) {
        resolve();
      } else {
        photo.onload = resolve;
      }
    });

    document.getElementById('receipt-screen').classList.add('show');
    // 여기서 자동으로 넘어가지 않음 — 버튼 대기
  }

  // ── 영수증 캡처 → Firebase 업로드 → QR 화면 ──
  async function captureAndUpload() {
    // 버튼 클릭 후 렌더링 완료 기다리기
    await new Promise(r => setTimeout(r, 200));
    const statusEl = document.getElementById('qr-status');
    const qrContainer = document.getElementById('qr-container');

    // QR 화면으로 전환
    document.getElementById('receipt-screen').classList.remove('show');
    document.getElementById('qr-screen').classList.add('show');
    statusEl.textContent = '영수증 생성 중...';
    qrContainer.innerHTML = '';

    let qrURL = null;

    try {
      // 영수증 캡처
      const wrapper = document.getElementById('receipt-wrapper');
      const canvas = await html2canvas(wrapper, {
        scale: 2.5,
        backgroundColor: '#fdfbf7',
        useCORS: true,
        allowTaint: true,
        logging: false
      });

      const receiptBlob = await new Promise(resolve =>
        canvas.toBlob(resolve, 'image/jpeg', 0.92)
      );

      // Firebase 업로드
      statusEl.textContent = '업로드 중...';
      const fb = window._fb;
      if (!fb) throw new Error('no firebase');

      const storageRef = fb.ref(fb.storage, `receipts/${Date.now()}.jpg`);
      await fb.uploadBytes(storageRef, receiptBlob, { contentType: 'image/jpeg' });
      qrURL = await fb.getDownloadURL(storageRef);
      statusEl.textContent = 'QR을 스캔해서 저장하세요!';

    } catch (e) {
      console.warn('Firebase 오류:', e.message);
      statusEl.textContent = 'QR을 스캔해서 저장하세요!';
      qrURL = window.location.href;
    }

    // QR 생성
    new QRCode(qrContainer, {
      text: qrURL,
      width: 180,
      height: 180,
      colorDark: '#1a1a18',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  // ── 재촬영 ──
  function retake() {
    shootBtn.disabled = false;
    document.getElementById('qr-screen').classList.remove('show');
    document.getElementById('receipt-screen').classList.remove('show');
    document.getElementById('viewfinder-screen').style.display = 'flex';
    photo.src = '';
    capturedBlob = null;
    document.getElementById('qr-container').innerHTML = '';
    document.getElementById('qr-status').textContent = '영수증 생성 중...';
  }

  window.startCountdown = startCountdown;
  window.retake = retake;

  window.addEventListener('load', startCamera);
</script>
</body>
</html>
