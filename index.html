<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="달래네컷">
<title>Nuvy Photo × 달래김밥</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #2c2c28;
    --cream: #fdfbf7;
    --ink: #1a1a18;
    --ink-soft: #3d3d38;
    --ink-muted: #7a7a72;
    --green: #3a5c2e;
    --border: #c4bfb0;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    padding: calc(24px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
  }

  /* ────── VIEWFINDER ────── */
  #viewfinder-screen {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding-top: 20px;
  }

  .vf-label {
    color: #faf6ef;
    font-size: 10px;
    letter-spacing: 0.25em;
    opacity: 0.5;
  }

  .vf-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    background: #111;
    border: 1.5px solid var(--green);
    overflow: hidden;
  }

  #live-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  .vf-corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--green);
    border-style: solid;
    opacity: 0.9;
  }
  .vf-corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .vf-corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .vf-corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .vf-corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  #countdown-display {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    z-index: 3;
  }
  #countdown-display.show { display: flex; }

  #countdown-number {
    font-size: 100px;
    font-weight: 700;
    color: #fff;
    animation: pulse 1s ease-in-out;
  }

  @keyframes pulse {
    0%   { transform: scale(1.5); opacity: 0; }
    60%  { transform: scale(1.0); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.7; }
  }

  .shoot-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid var(--green);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .shoot-btn::after {
    content: '';
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--green);
    transition: all 0.15s;
  }
  .shoot-btn:active::after { width: 42px; height: 42px; background: #2a4a20; }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.04s;
  }
  .flash-overlay.flash { opacity: 1; }

  /* ────── RECEIPT SCREEN ────── */
  #receipt-screen {
    display: none;
    width: 100%;
    max-width: 380px;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  #receipt-screen.show { display: flex; }

  #receipt-wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .zz-svg {
    display: block;
    width: 100%;
    flex-shrink: 0;
  }

  #receipt-body {
    background: var(--cream);
    padding: 18px 26px 22px;
    position: relative;
  }

  .dalrae-wm {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 30%;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .receipt-content { position: relative; z-index: 1; }

  .r-header {
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--border);
    margin-bottom: 14px;
  }
  .r-tag {
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--green);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .r-logo {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .r-logo em { color: var(--green); font-style: normal; }
  .r-sub {
    font-size: 8px;
    color: var(--ink-muted);
    letter-spacing: 0.18em;
    margin-top: 3px;
  }

  .r-meta {
    font-size: 9.5px;
    line-height: 2;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 14px;
    margin-bottom: 14px;
  }
  .r-meta-row { display: flex; justify-content: space-between; }
  .r-meta-label { color: var(--ink-muted); }
  .r-meta-val { color: var(--ink-soft); font-weight: 700; }

  /* photo — 3:4 fixed, no stretching */
  .r-photo-wrap {
    width: 100%;
    aspect-ratio: 3/4;
    background: #111;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 14px;
    position: relative;
  }
  #captured-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .r-items {
    border-top: 1px dashed var(--border);
    border-bottom: 1px dashed var(--border);
    padding: 12px 0;
    margin-bottom: 14px;
  }
  .r-item {
    display: flex;
    align-items: baseline;
    font-size: 10.5px;
    margin-bottom: 5px;
    gap: 4px;
  }
  .r-item:last-child { margin-bottom: 0; }
  .r-item-name { color: var(--ink); flex-shrink: 0; }
  .r-item-dots {
    flex: 1;
    border-bottom: 1px dotted var(--border);
    position: relative;
    top: -3px;
  }
  .r-item-price { color: var(--ink); font-weight: 700; flex-shrink: 0; }

  .r-total {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1.5px solid var(--ink);
  }

  .r-notices {
    font-size: 9px;
    color: var(--ink-muted);
    line-height: 2;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 14px;
    margin-bottom: 14px;
  }
  .r-notices p::before { content: '＊ '; }

  #qr-section { text-align: center; }
  .r-footer-text {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    line-height: 1.8;
    margin-bottom: 12px;
  }
  #qr-container {
    display: inline-block;
    padding: 8px;
    background: white;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    min-width: 136px;
    min-height: 136px;
    vertical-align: top;
  }
  #qr-container canvas, #qr-container img { display: block; }
  .r-scan-hint {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--ink-muted);
  }

  .r-barcode {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 2px;
    height: 26px;
    margin-top: 16px;
    opacity: 0.2;
  }
  .r-barcode span {
    background: var(--ink);
    border-radius: 1px;
    display: inline-block;
  }

  .action-row {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border: 1.5px solid;
    background: transparent;
    cursor: pointer;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    transition: all 0.15s;
  }
  .btn-save { border-color: var(--green); color: var(--green); }
  .btn-save:hover { background: var(--green); color: #faf6ef; }
  .btn-retake { border-color: rgba(250,246,239,0.5); color: rgba(250,246,239,0.7); }
  .btn-retake:hover { background: rgba(250,246,239,0.08); }

  #capture-canvas { display: none; }
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>

<!-- VIEWFINDER -->
<div id="viewfinder-screen">
  <p class="vf-label">≋ NUVY PHOTO × 달래김밥 ≋</p>
  <div class="vf-frame">
    <video id="live-video" autoplay playsinline muted></video>
    <div class="vf-corner tl"></div>
    <div class="vf-corner tr"></div>
    <div class="vf-corner bl"></div>
    <div class="vf-corner br"></div>
    <div id="countdown-display">
      <span id="countdown-number">3</span>
    </div>
  </div>
  <button class="shoot-btn" id="shoot-btn" onclick="startCountdown()"></button>
  <p class="vf-label" style="font-size:9px;">눌러서 촬영</p>
</div>

<!-- RECEIPT -->
<div id="receipt-screen">
  <div id="receipt-wrapper">

    <!-- zigzag TOP: dark bg → cream teeth -->
    <svg class="zz-svg" viewBox="0 0 380 16" preserveAspectRatio="none">
      <rect width="380" height="16" fill="transparent"/>
      <polygon fill="#fdfbf7" points="
        0,16 10,0 20,16 30,0 40,16 50,0 60,16 70,0 80,16 90,0
        100,16 110,0 120,16 130,0 140,16 150,0 160,16 170,0 180,16 190,0
        200,16 210,0 220,16 230,0 240,16 250,0 260,16 270,0 280,16 290,0
        300,16 310,0 320,16 330,0 340,16 350,0 360,16 370,0 380,16
      "/>
    </svg>

    <div id="receipt-body">
      <!-- 사진 위쪽 2개 -->
      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="top:30px; left:10%; width:15%; transform:rotate(-15deg);">

      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="top:50px; right:16%; width:20%; transform:rotate(30deg);">

      <!-- 사진 아래쪽 3개 -->
      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="bottom:250px; left:5%; width:17%; transform:rotate(10deg);">

      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="bottom:400px; left:50%; transform:translateX(-50%) rotate(-8deg); width:18%;">

      <img class="dalrae-wm" src="dalea.png" alt="" onerror="this.style.display='none'"
        style="bottom:200px; right:5%; width:20%; transform:rotate(15deg);">
      <div class="receipt-content">

        <div class="r-header">
          <p class="r-tag">✿ SEASONAL ITEM ✿</p>
          <p class="r-logo">Nuvy Photo <em>×</em> 달래김밥</p>
          <p class="r-sub">BUSAN CITIZEN PARK</p>
        </div>

        <div class="r-meta">
          <div class="r-meta-row">
            <span class="r-meta-label">ORDER NO.</span>
            <span class="r-meta-val" id="order-no">#0001</span>
          </div>
          <div class="r-meta-row">
            <span class="r-meta-label">DATE</span>
            <span class="r-meta-val" id="receipt-date">—</span>
          </div>
          <div class="r-meta-row">
            <span class="r-meta-label">WEATHER</span>
            <span class="r-meta-val">봄날의 햇살 ☀</span>
          </div>
        </div>

        <div class="r-photo-wrap">
          <img id="captured-photo" src="" alt="photo">
        </div>

        <div class="r-items">
          <div class="r-item">
            <span class="r-item-name">알싸한 봄 한 조각</span>
            <span class="r-item-dots"></span>
            <span class="r-item-price">1컷</span>
          </div>
          <div class="r-item">
            <span class="r-item-name">달래장 계란말이 추억</span>
            <span class="r-item-dots"></span>
            <span class="r-item-price">1인분</span>
          </div>
          <div class="r-item">
            <span class="r-item-name">부가세 (행복 포함)</span>
            <span class="r-item-dots"></span>
            <span class="r-item-price">100%</span>
          </div>
          <div class="r-total">
            <span>TOTAL</span>
            <span>₩ 0</span>
          </div>
        </div>

        <div class="r-notices">
          <p>본 상품은 유통기한이 없습니다.</p>
          <p>평생 간직을 권장합니다.</p>
          <p>재료: 달래의 향 + 계란의 고소함.</p>
        </div>

        <!-- QR: hidden on download -->
        <div id="qr-section">
          <p class="r-footer-text">봄을 주머니에 쏙—<br>🌿 스캔하면 저장돼요</p>
          <div id="qr-container"></div>
          <p class="r-scan-hint">SCAN TO DOWNLOAD</p>
          <div class="r-barcode" id="barcode"></div>
        </div>

      </div>
    </div>

    <!-- zigzag BOTTOM: cream → dark -->
    <svg class="zz-svg" viewBox="0 0 380 16" preserveAspectRatio="none">
      <rect width="380" height="16" fill="transparent"/>
      <polygon fill="#fdfbf7" points="
        0,0 10,16 20,0 30,16 40,0 50,16 60,0 70,16 80,0 90,16
        100,0 110,16 120,0 130,16 140,0 150,16 160,0 170,16 180,0 190,16
        200,0 210,16 220,0 230,16 240,0 250,16 260,0 270,16 280,0 290,16
        300,0 310,16 320,0 330,16 340,0 350,16 360,0 370,16 380,0
      "/>
    </svg>

  </div>

  <div class="action-row">
    <button class="btn btn-save" onclick="downloadReceipt()">SAVE RECEIPT</button>
    <button class="btn btn-retake" onclick="retake()">RETAKE</button>
  </div>
</div>

<canvas id="capture-canvas"></canvas>

<!-- Firebase SDK (ESM) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // ── 여기에 Firebase config 붙여넣기 ──
  const firebaseConfig = {
    apiKey:            "AIzaSyDCNniApykmIrkgpBI4rzhG5JEqvlsjCIc",
    authDomain:        "nuvyseason.firebaseapp.com",
    projectId:         "nuvyseason",
    storageBucket:     "nuvyseason.firebasestorage.app",
    messagingSenderId: "93515457991",
    appId:             "1:93515457991:web:6a4c78097a4d201199a5e2"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);
  window._fb = { storage, ref, uploadBytes, getDownloadURL };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
  const video     = document.getElementById('live-video');
  const capCanvas = document.getElementById('capture-canvas');
  const photo     = document.getElementById('captured-photo');
  const cdDisplay = document.getElementById('countdown-display');
  const cdNumber  = document.getElementById('countdown-number');
  const flashEl   = document.getElementById('flash');
  const shootBtn  = document.getElementById('shoot-btn');

  let stream       = null;
  let capturedBlob = null;
  let orderCount   = parseInt(localStorage.getItem('nuvy-order') || '0') + 1;

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1080 }, height: { ideal: 1440 } },
        audio: false
      });
      video.srcObject = stream;
    } catch (e) {
      alert('카메라 권한을 허용해주세요 (HTTPS 필요)');
    }
  }

  function startCountdown() {
    if (!stream) return;
    shootBtn.disabled = true;
    let count = 3;
    cdDisplay.classList.add('show');
    cdNumber.textContent = count;
    const iv = setInterval(() => {
      count--;
      if (count > 0) {
        cdNumber.textContent = count;
        cdNumber.style.animation = 'none';
        void cdNumber.offsetWidth;
        cdNumber.style.animation = 'pulse 1s ease-in-out';
      } else {
        clearInterval(iv);
        cdDisplay.classList.remove('show');
        capturePhoto();
      }
    }, 1000);
  }

  function capturePhoto() {
    flashEl.classList.add('flash');
    setTimeout(() => flashEl.classList.remove('flash'), 150);
    const w = video.videoWidth, h = video.videoHeight;
    capCanvas.width = w; capCanvas.height = h;
    const ctx = capCanvas.getContext('2d');
    ctx.translate(w, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, w, h);
    capCanvas.toBlob(blob => {
      capturedBlob = blob;
      photo.src = URL.createObjectURL(blob);
      photo.onload = () => showReceipt();
    }, 'image/jpeg', 0.92);
  }

  function setMeta() {
    const now = new Date();
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    document.getElementById('receipt-date').textContent =
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
    document.getElementById('order-no').textContent = '#' + String(orderCount).padStart(4,'0');
  }

  async function showReceipt() {
    setMeta();
    localStorage.setItem('nuvy-order', orderCount);
    orderCount++;
    document.getElementById('viewfinder-screen').style.display = 'none';
    document.getElementById('receipt-screen').classList.add('show');
    generateBarcode();
    await uploadAndQR();
  }

  async function uploadAndQR() {
    const qrContainer = document.getElementById('qr-container');
    qrContainer.innerHTML = '<p style="font-size:9px;color:#7a7a72;padding:8px 4px;">업로드 중...</p>';

    let qrURL = null;

    try {
      const fb = window._fb;
      if (!fb || !capturedBlob) throw new Error('no firebase');
      const storageRef = fb.ref(fb.storage, `photos/${Date.now()}.jpg`);
      await fb.uploadBytes(storageRef, capturedBlob, { contentType: 'image/jpeg' });
      qrURL = await fb.getDownloadURL(storageRef);
    } catch (e) {
      console.warn('Firebase 미연결 — 로컬 URL 사용:', e.message);
      qrURL = URL.createObjectURL(capturedBlob);
    }

    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: qrURL,
      width: 120,
      height: 120,
      colorDark: '#1a1a18',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  function generateBarcode() {
    const bc = document.getElementById('barcode');
    bc.innerHTML = '';
    for (let i = 0; i < 55; i++) {
      const s = document.createElement('span');
      s.style.width  = Math.random() > 0.5 ? '2px' : '1px';
      s.style.height = (Math.random() > 0.3 ? 12 + Math.random()*14 : 5 + Math.random()*6) + 'px';
      bc.appendChild(s);
    }
  }

  async function downloadReceipt() {
    const qrSection = document.getElementById('qr-section');
    qrSection.style.visibility = 'hidden';
    try {
      const wrapper = document.getElementById('receipt-wrapper');
      const canvas = await html2canvas(wrapper, {
        scale: 2.5,
        backgroundColor: null,
        useCORS: true,
        allowTaint: true,
        logging: false
      });
      const link = document.createElement('a');
      link.download = `nuvy-dalrae-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (e) {
      alert('저장 중 오류가 발생했어요. 다시 시도해주세요.');
      console.error(e);
    } finally {
      qrSection.style.visibility = 'visible';
    }
  }

  function retake() {
    shootBtn.disabled = false;
    document.getElementById('receipt-screen').classList.remove('show');
    document.getElementById('viewfinder-screen').style.display = 'flex';
    photo.src = '';
    capturedBlob = null;
    document.getElementById('qr-container').innerHTML = '';
  }

  window.startCountdown  = startCountdown;
  window.downloadReceipt = downloadReceipt;
  window.retake          = retake;

  window.addEventListener('load', startCamera);
</script>
</body>
</html>
